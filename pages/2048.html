<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра 2048</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/games/2048.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<header class="game-header">
    <a href="../index.html" class="home-btn" aria-label="На головну">
        <svg viewBox="0 0 24 24" class="home-icon" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <select class="language-select game-language-select">
        <option value="uk">UA</option>
        <option value="en">EN</option>
    </select>

    <div>
        <h1 data-i18n="game.2048.title">Гра 2048</h1>
        <p data-i18n="game.2048.desc">
            Об’єднуйте однакові числа та спробуйте отримати плитку 2048.
        </p>
    </div>
</header>

<main class="game-page">

    <div class="game-info">
        <p>
            <span data-i18n="game.score">Рахунок:</span>
            <span id="score">0</span>
        </p>

        <button id="restartBtn" data-i18n="button.newGame">Нова гра</button>
    </div>

    <div id="game-board" class="board-2048"></div>

    <p id="message" class="game-message"></p>

    <section class="rules-box">
        <h2 data-i18n="game.rules">Правила гри</h2>
        <p data-i18n="rules.2048">
            У грі 2048 потрібно об’єднувати однакові плитки, щоб отримати плитку 2048.
        </p>
    </section>

</main>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/games/2048.js"></script>
</body>
</html>
